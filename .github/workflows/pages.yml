name: Deploy GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # GitHub Pages serves at /<repo-name>/; assets must use this base path
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add extra static pages
        run: |
          if [ -f "śłłśąŹšĽčÁĽć.html" ]; then
            cp "śłłśąŹšĽčÁĽć.html" "dist/śłłśąŹšĽčÁĽć.html"
          fi

      - name: SPA 404 fallback
        run: |
          if [ -d dist ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><script>sessionStorage.redirect = location.href;</script><meta http-equiv="refresh" content="0;url=/${{ github.event.repository.name }}/"></head><body>Redirecting‚Ä¶</body></html>' > dist/404.html
          fi

      - name: Disable Jekyll
        run: |
          if [ -d dist ]; then
            touch dist/.nojekyll
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
